{% extends "base.html" %}
{% block title %}Nuevo plan{% endblock %}
{% block page_heading %}Nuevo plan{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-title">Crear plan</div>
  <a href="/plans" class="btn btn-secondary">← Volver</a>
</div>

<div class="card form-page">
  {% if error %}
  <div class="error-alert">✕ {{ error }}</div>
  {% endif %}

  <form method="post" action="/plans/create">
    <div class="form-grid form-grid-2" style="margin-bottom:16px">
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label" for="nombre">Nombre del plan <span class="required">*</span></label>
        <input class="form-control" type="text" id="nombre" name="nombre"
               value="{{ form.nombre if form else '' }}" required placeholder="Ej: Plan Básico 1 Mes">
      </div>
      <div class="form-group">
        <label class="form-label" for="duracion_dias">Duración (días) <span class="required">*</span></label>
        <input class="form-control" type="number" id="duracion_dias" name="duracion_dias"
               value="{{ form.duracion_dias if form else '30' }}" required min="1">
      </div>
      <div class="form-group">
        <label class="form-label" for="pantallas">Pantallas <span class="required">*</span></label>
        <input class="form-control" type="number" id="pantallas" name="pantallas"
               value="{{ form.pantallas if form else '1' }}" required min="1">
      </div>
      <div class="form-group">
        <label class="form-label" for="precio">Precio (USD) <span class="required">*</span></label>
        <input class="form-control" type="number" id="precio" name="precio"
               value="{{ form.precio if form else '' }}" required min="0" step="0.01" placeholder="0.00">
      </div>
    </div>

    <div class="form-group" style="margin-bottom:20px">
      <label class="toggle-group">
        <span class="form-label" style="margin:0">Plan activo</span>
        <label class="toggle-switch">
          <input type="checkbox" name="activo" value="on" checked>
          <span class="toggle-slider"></span>
        </label>
      </label>
      <div class="form-hint mt-1">Los planes inactivos no aparecen al crear suscripciones.</div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Crear plan</button>
      <a href="/plans" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
