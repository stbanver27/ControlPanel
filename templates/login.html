<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — IPTV Control Center</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">📺</div>
    <h1 class="login-title">IPTV Control Center</h1>
    <p class="login-subtitle">Panel administrativo interno</p>

    {% if flash %}
    <div class="flash flash-{{ flash.type }}" style="margin-bottom:16px">
      {% if flash.type == 'error' %}✕{% else %}✓{% endif %}
      {{ flash.message }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label" for="email">Email</label>
        <input
          class="form-control"
          type="email"
          id="email"
          name="email"
          placeholder="admin@empresa.com"
          required
          autofocus
        >
      </div>
      <div class="form-group" style="margin-bottom:22px">
        <label class="form-label" for="password">Contraseña</label>
        <input
          class="form-control"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
        >
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px">
        Ingresar →
      </button>
    </form>
  </div>
</div>
<script src="/static/js/main.js"></script>
</body>
</html>
